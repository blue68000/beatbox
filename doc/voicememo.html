<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>かんたんボイスメモ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .button-group { margin-bottom: 10px; }
        button { padding: 8px 15px; margin-right: 5px; cursor: pointer; }
        /* テキストエリアを見やすく、編集もできるように変更 */
        #result-box {
            width: 100%;
            height: 200px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>簡易ボイスメモアプリ</h2>
    
    <div class="button-group">
        <button id="start-btn" style="background-color: #e3faf2;">🎤 録音開始</button>
        <button id="stop-btn" style="background-color: #ffe3e3;">⏹️ 停止</button>
        <button id="clear-btn">✨ クリア</button>
        <button id="download-btn" style="background-color: #e8f4fd;">💾 保存(DL)</button>
    </div>
    
    <textarea id="result-box" placeholder="ここに文字起こしされたテキストが表示されます。直接編集もできますよ！"></textarea>

    <script>
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
          alert("お使いのブラウザは音声認識に対応していません。ChromeやEdgeでお試しください。");
      } else {
          const recognition = new SpeechRecognition();
          recognition.lang = 'ja-JP';
          recognition.interimResults = true;
          recognition.continuous = true;

          const startBtn = document.getElementById('start-btn');
          const stopBtn = document.getElementById('stop-btn');
          const clearBtn = document.getElementById('clear-btn');
          const downloadBtn = document.getElementById('download-btn');
          const resultBox = document.getElementById('result-box');

          // 💡 ユーザーが明示的にストップを押したかどうかを管理するフラグ
          let isUserStopping = false;

          // 🎤 録音開始
          startBtn.onclick = () => {
              isUserStopping = false; // フラグをリセット
              recognition.start();
              startBtn.style.backgroundColor = "#a7f3d0"; // 録音中っぽく色を変える
          };

          // ⏹️ 停止
          stopBtn.onclick = () => {
              isUserStopping = true; // ユーザーが止めたよ！という印をつける
              recognition.stop();
              startBtn.style.backgroundColor = "#e3faf2"; // ボタンの色を戻す
          };

          // ✨ クリア
          clearBtn.onclick = () => {
              if(confirm("メモをクリアしますか？")) {
                  resultBox.value = '';
              }
          };

          // 💾 保存（DL）
          downloadBtn.onclick = () => {
              const text = resultBox.value;
              if (!text) { alert("保存するテキストがありません。"); return; }
              const blob = new Blob([text], { type: 'text/plain' });
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              const now = new Date();
              const filename = `voicememo_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.txt`;
              a.download = filename;
              a.click();
              URL.revokeObjectURL(a.href);
          };

          // 🗣️ 音声を認識したとき（前回の改善版！）
          recognition.onresult = (event) => {
              let currentFinal = '';
              let interimTranscript = '';

              for (let i = 0; i < event.results.length; ++i) {
                  if (event.results[i].isFinal) {
                      currentFinal += event.results[i][0].transcript + '\n'; // 改行付き
                  } else {
                      interimTranscript += event.results[i][0].transcript;
                  }
              }
              resultBox.value = currentFinal + interimTranscript;
          };

          // 💡【ここがポイント！】音声認識が（勝手に、あるいは意図して）終了したとき
          recognition.onend = () => {
              // ユーザーが停止ボタンを押していないのに終了した＝ブラウザが勝手に止めた場合
              if (!isUserStopping) {
                  console.log("ブラウザによって切断されたため、自動再開します...");
                  recognition.start(); // ゾンビのように不屈の精神で即座に再起動！
              } else {
                  console.log("ユーザーによって正常に停止されました。");
              }
          };
      }
    </script>

</body>
</html>
