<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お気楽ビートボックスアプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 15px; /* スマホ向けに少し余白をスリムに */
            background-color: #1e1e24;
            color: #f0f0f5;
            text-align: center;
        }
        h1 { margin-bottom: 5px; color: #00d2ff; font-size: 24px; } /* タイトルも少しコンパクトに */
        
        .version-badge {
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
        }

        .config-panel {
            background-color: #2a2a35;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: inline-block;
            font-size: 14px;
        }
        .master-controls {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-master-play { background-color: #00e676; color: #111; font-size: 14px; padding: 10px 18px; font-weight: bold; }
        .btn-master-stop { background-color: #ff1744; color: white; font-size: 14px; padding: 10px 18px; font-weight: bold; }
        .btn-master-mix { background-color: #00b0ff; color: white; font-size: 14px; padding: 10px 18px; font-weight: bold; }

        .tracks-container {
            max-width: 600px; /* スマホ向けに全体の幅をスリムに */
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        /* ★改良ポイント：縦並び(column)のFlexboxに変更 */
        .track-row {
            background-color: #2a2a35;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            flex-direction: column; 
            gap: 8px; /* 上の段と下の段のすき間 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-left: 5px solid #555;
        }
        .track-row.recording { border-left-color: #ff4d4d; background-color: #3a2225; }
        .track-row.playing { border-left-color: #4caf50; background-color: #223a25; }
        
        /* ★新設：1段目（トラック情報とステータス）を横並びにする */
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .track-info { font-weight: bold; font-size: 15px; text-align: left; }
        
        /* ★改良ポイント：2段目（ボタン群）を画面幅いっぱいに広げて折り返し可能に */
        .btn-group { 
            display: flex; 
            gap: 6px; 
            align-items: center; 
            justify-content: space-between; /* ボタンを綺麗に等間隔に配置 */
            flex-wrap: wrap; /* 万が一画面が極小でもボタンがはみ出さないように */
            width: 100%;
        }
        
        /* ボタンのサイズをスマホで押しやすい絶妙なコンパクト感に */
        button {
            flex: 1; /* ボタンの横幅を均等に広げる */
            min-width: 40px; /* 狭くなりすぎを防止 */
            padding: 6px 4px;
            font-size: 11px;
            font-weight: bold;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        .btn-rec { background-color: #ff4d4d; color: white; }
        .btn-stop { background-color: #f44336; color: white; }
        .btn-play { background-color: #4caf50; color: white; }
        .btn-loop { background-color: #2196f3; color: white; }
        .btn-del { background-color: #757575; color: white; }
        .btn-save { background-color: #e91e63; color: white; }
        .btn-load { background-color: #ff9800; color: white; }
        
        button:disabled { background-color: #444 !important; color: #777 !important; cursor: not-allowed; transform: none !important; }
        
        .status-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background-color: #444;
            color: #aaa;
        }
        
        .file-input { display: none; }
    </style>
</head>
<body>

    <h1>お気楽ビートボックス</h1>
    <div class="version-badge">Version 1.3.1 (スマホ向けレイアウト最適化版)</div>
    <p>じぇみにん＆共同開発プロジェクト</p>

    <div class="config-panel">
        <label for="maxDuration">録音上限時間：</label>
        <select id="maxDuration" style="padding: 5px; background: #333; color: white; border: 1px solid #555;">
            <option value="3">3秒</option>
            <option value="5" selected>5秒</option>
            <option value="10">10秒</option>
            <option value="20">20秒</option>
            <option value="30">30秒</option>
            <option value="60">60秒</option>
            <option value="90">90秒</option>
            <option value="120">120秒</option>
            <option value="180">180秒</option>
            <option value="240">240秒</option>
            <option value="300">300秒</option>
            <option value="360">360秒</option>
            <option value="420">420秒</option>
            <option value="480">480秒</option>
            <option value="540">540秒</option>
            <option value="600">600秒</option>
            <option value="1200">1200秒</option>
        </select>
        <span style="margin-left: 15px; color: #aaa; font-size: 14px;">※自動終了</span>
    </div>

    <div class="master-controls">
        <button id="masterPlayBtn" class="btn-master-play">▶ 一斉ループ再生</button>
        <button id="masterStopBtn" class="btn-master-stop">■ 全停止</button>
        <button id="masterMixBtn" class="btn-master-mix">🎵 合成して保存</button>
    </div>

    <div class="tracks-container" id="tracksContainer"></div>

<script>
    // ※ ロジック部分は完全にそのまま維持しています！
    const TRACK_COUNT = 8;
    const tracksContainer = document.getElementById('tracksContainer');
    const maxDurationSelect = document.getElementById('maxDuration');
    const masterPlayBtn = document.getElementById('masterPlayBtn');
    const masterStopBtn = document.getElementById('masterStopBtn');
    const masterMixBtn = document.getElementById('masterMixBtn');

    let trackData = Array.from({ length: TRACK_COUNT }, (_, i) => ({
        id: i + 1,
        mediaRecorder: null,
        audioChunks: [],
        audioBlob: null,
        audioElement: new Audio(),
        recordingTimeout: null
    }));

    trackData.forEach(track => {
        const row = document.createElement('div');
        row.className = 'track-row';
        row.id = `track-row-${track.id}`;
        
        // ★HTML変更ポイント：上段を「track-header」で包んで綺麗に2分割！
        row.innerHTML = `
            <div class="track-header">
                <div class="track-info">トラック ${track.id}</div>
                <div class="status-badge" id="status-${track.id}">空</div>
            </div>
            <div class="btn-group">
                <button class="btn-rec" id="rec-${track.id}">録音</button>
                <button class="btn-stop" id="stop-${track.id}" disabled>停止</button>
                <button class="btn-play" id="play-${track.id}" disabled>再生</button>
                <button class="btn-loop" id="loop-${track.id}">繰返</button>
                <button class="btn-del" id="del-${track.id}" disabled>削除</button>
                <button class="btn-save" id="save-${track.id}" disabled>保存</button>
                <button class="btn-load" id="loadBtn-${track.id}">読込</button>
                <input type="file" id="file-${track.id}" class="file-input" accept="audio/*">
            </div>
        `;
        tracksContainer.appendChild(row);

        const recBtn = row.querySelector(`#rec-${track.id}`);
        const stopBtn = row.querySelector(`#stop-${track.id}`);
        const playBtn = row.querySelector(`#play-${track.id}`);
        const loopBtn = row.querySelector(`#loop-${track.id}`);
        const delBtn = row.querySelector(`#del-${track.id}`);
        const saveBtn = row.querySelector(`#save-${track.id}`);
        const loadBtn = row.querySelector(`#loadBtn-${track.id}`);
        const fileInput = row.querySelector(`#file-${track.id}`);
        const statusBadge = row.querySelector(`#status-${track.id}`);

        const setAudioSource = (blob) => {
            track.audioBlob = blob;
            track.audioElement.src = URL.createObjectURL(blob);
            statusBadge.innerText = "データあり";
            playBtn.disabled = false;
            loopBtn.disabled = false;
            delBtn.disabled = false;
            saveBtn.disabled = false;
        };

        recBtn.addEventListener('click', async () => {
            track.audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                });
                
                track.mediaRecorder = new MediaRecorder(stream);
                track.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) track.audioChunks.push(e.data);
                };

                track.mediaRecorder.onstop = () => {
                    clearTimeout(track.recordingTimeout);
                    const blob = new Blob(track.audioChunks, { type: 'audio/wav' });
                    setAudioSource(blob);
                    
                    row.classList.remove('recording');
                    recBtn.disabled = false;
                    stopBtn.disabled = true;

                    stream.getTracks().forEach(t => t.stop());
                };

                track.mediaRecorder.start();
                row.classList.add('recording');
                statusBadge.innerText = "録音中...";
                recBtn.disabled = true;
                stopBtn.disabled = false;

                const limitTime = parseInt(maxDurationSelect.value) * 1000;
                track.recordingTimeout = setTimeout(() => {
                    if (track.mediaRecorder && track.mediaRecorder.state !== 'inactive') {
                        track.mediaRecorder.stop();
                    }
                }, limitTime);

            } catch (err) {
                alert("マイクエラー: " + err);
            }
        });

        stopBtn.addEventListener('click', () => {
            if (track.mediaRecorder && track.mediaRecorder.state !== 'inactive') {
                track.mediaRecorder.stop();
            }
            if (!track.audioElement.paused) {
                track.audioElement.pause();
                track.audioElement.currentTime = 0;
                row.classList.remove('playing');
                statusBadge.innerText = "データあり";
            }
        });

        playBtn.addEventListener('click', () => {
            track.audioElement.loop = false;
            track.audioElement.currentTime = 0;
            track.audioElement.play();
            row.classList.add('playing');
            statusBadge.innerText = "再生中";
            stopBtn.disabled = false;
        });

        loopBtn.addEventListener('click', () => {
            track.audioElement.loop = true;
            track.audioElement.currentTime = 0;
            track.audioElement.play();
            row.classList.add('playing');
            statusBadge.innerText = "ループ再生中";
            stopBtn.disabled = false;
        });

        track.audioElement.addEventListener('ended', () => {
            if (!track.audioElement.loop) {
                row.classList.remove('playing');
                statusBadge.innerText = "データあり";
            }
        });

        delBtn.addEventListener('click', () => {
            track.audioElement.pause();
            track.audioElement.src = "";
            track.audioBlob = null;
            track.audioChunks = [];
            row.className = 'track-row';
            statusBadge.innerText = "空";
            playBtn.disabled = true;
            loopBtn.disabled = true;
            delBtn.disabled = true;
            saveBtn.disabled = true;
            stopBtn.disabled = true;
        });
        
        saveBtn.addEventListener('click', () => {
            if (!track.audioBlob) return;
            const currentName = prompt("個別トラックのファイル名を入力してください", `beatbox_track${track.id}`);
            if (currentName === null) return;
            const finalName = currentName.trim() === "" ? `beatbox_track${track.id}` : currentName;

            const url = URL.createObjectURL(track.audioBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${finalName}.wav`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        loadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setAudioSource(file);
        });
    });

    masterPlayBtn.addEventListener('click', () => {
        trackData.forEach(track => {
            if (track.audioBlob) {
                const row = document.getElementById(`track-row-${track.id}`);
                const statusBadge = document.getElementById(`status-${track.id}`);
                const stopBtn = document.getElementById(`stop-${track.id}`);
                
                track.audioElement.loop = true;
                track.audioElement.currentTime = 0;
                track.audioElement.play();
                
                row.classList.add('playing');
                statusBadge.innerText = "ループ再生中";
                stopBtn.disabled = false;
            }
        });
    });

    masterStopBtn.addEventListener('click', () => {
        trackData.forEach(track => {
            if (track.mediaRecorder && track.mediaRecorder.state !== 'inactive') {
                track.mediaRecorder.stop();
            }
            if (!track.audioElement.paused) {
                track.audioElement.pause();
                track.audioElement.currentTime = 0;
                
                const row = document.getElementById(`track-row-${track.id}`);
                const statusBadge = document.getElementById(`status-${track.id}`);
                row.className = 'track-row';
                statusBadge.innerText = "データあり";
            }
        });
    });

    masterMixBtn.addEventListener('click', async () => {
        const activeTracks = trackData.filter(t => t.audioBlob !== null);
        if (activeTracks.length === 0) {
            alert("合成する音声データがありません。");
            return;
        }

        const defaultFileName = "beatbox_mixed_session";
        const userInput = prompt("合成後のファイル名を入力してください（拡張子不要）:", defaultFileName);
        if (userInput === null) return;
        const fileName = userInput.trim() === "" ? defaultFileName : userInput;

        masterMixBtn.disabled = true;
        masterMixBtn.innerText = "合成中...";

        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();

            const decodePromises = activeTracks.map(async (track) => {
                const arrayBuffer = await track.audioBlob.arrayBuffer();
                return await audioCtx.decodeAudioData(arrayBuffer);
            });

            const audioBuffers = await Promise.all(decodePromises);
            const maxDuration = Math.max(...audioBuffers.map(buf => buf.duration));
            const sampleRate = audioCtx.sampleRate;
            const totalSamples = maxDuration * sampleRate;

            const offlineCtx = new OfflineAudioContext(1, totalSamples, sampleRate);

            audioBuffers.forEach(buffer => {
                const source = offlineCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(offlineCtx.destination);
                source.start(0);
            });

            const renderedBuffer = await offlineCtx.startRendering();
            const wavBlob = bufferToWav(renderedBuffer);

            const url = URL.createObjectURL(wavBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${fileName}.wav`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            alert("合成完了！ファイルが保存されました。");

        } catch (error) {
            console.error(error);
            alert("合成中にエラーが発生しました: " + error.message);
        } finally {
            masterMixBtn.disabled = false;
            masterMixBtn.innerText = "🎵 合成して保存";
        }
    });

    function bufferToWav(buffer) {
        const numOfChan = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1;
        const bitDepth = 16;
        
        let result;
        if (numOfChan === 2) {
            result = interleave(buffer.getChannelData(0), buffer.getChannelData(1));
        } else {
            result = buffer.getChannelData(0);
        }
        
        const bufferLength = result.length * 2;
        const ab = new ArrayBuffer(44 + bufferLength);
        const view = new DataView(ab);
        
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + bufferLength, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numOfChan, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numOfChan * (bitDepth / 8), true);
        view.setUint16(32, numOfChan * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeString(view, 36, 'data');
        view.setUint32(40, bufferLength, true);
        
        floatTo16BitPCM(view, 44, result);
        
        return new Blob([view], { type: 'audio/wav' });
    }

    function interleave(inputL, inputR) {
        const length = inputL.length + inputR.length;
        const result = new Float32Array(length);
        let index = 0;
        let inputIndex = 0;
        while (index < length) {
            result[index++] = inputL[inputIndex];
            result[index++] = inputR[inputIndex];
            inputIndex++;
        }
        return result;
    }

    function floatTo16BitPCM(output, offset, input) {
        for (let i = 0; i < input.length; i++, offset += 2) {
            let s = Math.max(-1, Math.min(1, input[i]));
            output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
    }

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }
</script>
</body>
</html>
