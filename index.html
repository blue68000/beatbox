<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>録音・再生テストアプリ</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            text-align: center;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            font-size: 16px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
        }
        #recordBtn { background-color: #ff4d4d; color: white; }
        #stopBtn { background-color: #cccccc; color: #333333; }
        #recordBtn:disabled, #stopBtn:disabled { background-color: #e0e0e0; color: #999999; cursor: not-allowed; }
        .status { margin: 20px 0; font-weight: bold; color: #333; }
        audio { margin-top: 20px; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>録音・再生テスト</h2>
    
    <div>
        <button id="recordBtn">録音開始</button>
        <button id="stopBtn" disabled>停止</button>
    </div>

    <div class="status" id="statusText">マイクの使用を許可して「録音開始」を押してください</div>

    <div>
        <h3>再生コントロール</h3>
        <audio id="audioPlayback" controls></audio>
    </div>
</div>

<button id="uploadBtn" disabled style="background-color: #4caf50; color: white;">Googleドライブに保存</button>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob = null; // 録音データを保持する変数

    // ★ここに先ほどコピーしたGASのWebアプリURL（/exec）を貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw2bgGF4ojQP9M0jxnOe289gW32T-db-nrbof4IjbIwiu84rGA9F6FVMJJ6WrhzGogc/exec";

    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusText = document.getElementById('statusText');
    const audioPlayback = document.getElementById('audioPlayback');

    recordBtn.addEventListener('click', async () => {
        audioChunks = [];
        uploadBtn.disabled = true;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                audioPlayback.src = audioUrl;
                statusText.innerText = "録音完了！ドライブに保存できます。";
                
                uploadBtn.disabled = false; // 保存ボタンを押せるようにする
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            statusText.innerText = "録音中...";
            recordBtn.disabled = true;
            stopBtn.disabled = false;
        } catch (err) {
            statusText.innerText = "マイクエラー: " + err;
        }
    });

    stopBtn.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
        }
    });

    // ★新しく追加：GAS経由でGoogleドライブにアップロードする処理
    uploadBtn.addEventListener('click', async () => {
        if (!audioBlob) return;

        statusText.innerText = "Googleドライブにアップロード中...";
        uploadBtn.disabled = true;

        // 1. 音声BlobデータをBase64（テキスト）に変換する
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1]; // プレフィックスを除去

            // 2. GASに送るデータを作成
            const payload = {
                audio: base64Audio,
                fileName: "audio_" + Date.now() + ".wav"
            };

            try {
                // 3. fetchでGASへPOST送信
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    statusText.innerText = "保存成功！ドライブを確認してみてね＾＾";
                } else {
                    statusText.innerText = "保存失敗: " + result.message;
                    uploadBtn.disabled = false;
                }
            } catch (error) {
                statusText.innerText = "通信エラーが発生しました。";
                console.error(error);
                uploadBtn.disabled = false;
            }
        };
    });
</script>

</body>
</html>
