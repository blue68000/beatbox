<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お気楽ビートボックスアプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 20px;
            background-color: #1e1e24;
            color: #f0f0f5;
            text-align: center;
        }
        h1 { margin-bottom: 5px; color: #00d2ff; }
        
        /* ★新機能：バージョン表記のスタイル */
        .version-badge {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        .config-panel {
            background-color: #2a2a35;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .master-controls {
            margin-bottom: 20px;
        }
        .btn-master-play { background-color: #00e676; color: #111; font-size: 16px; padding: 12px 24px; font-weight: bold; }
        .btn-master-stop { background-color: #ff1744; color: white; font-size: 16px; padding: 12px 24px; font-weight: bold; }

        .tracks-container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .track-row {
            background-color: #2a2a35;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-left: 5px solid #555;
        }
        .track-row.recording { border-left-color: #ff4d4d; background-color: #3a2225; }
        .track-row.playing { border-left-color: #4caf50; background-color: #223a25; }
        
        .track-info { font-weight: bold; font-size: 16px; min-width: 90px; text-align: left; }
        .btn-group { display: flex; gap: 8px; }
        
        button {
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        .btn-rec { background-color: #ff4d4d; color: white; }
        .btn-stop { background-color: #f44336; color: white; }
        .btn-play { background-color: #4caf50; color: white; }
        .btn-loop { background-color: #2196f3; color: white; }
        .btn-del { background-color: #757575; color: white; }
        .btn-save { background-color: #9c27b0; color: white; }
        
        button:disabled { background-color: #444 !important; color: #777 !important; cursor: not-allowed; transform: none !important; }
        
        .status-badge {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
            background-color: #444;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>お気楽ビートボックス</h1>
    <div class="version-badge">Version 1.1.0 (個別保存機能追加版)</div>
    <p>じぇみにん＆共同開発プロジェクト</p>

    <div class="config-panel">
        <label for="maxDuration">録音上限時間：</label>
        <select id="maxDuration" style="padding: 5px; background: #333; color: white; border: 1px solid #555;">
            <option value="3">3秒</option>
            <option value="5" selected>5秒</option>
            <option value="10">10秒</option>
            <option value="20">20秒</option>
        </select>
        <span style="margin-left: 15px; color: #aaa; font-size: 14px;">※停止を押すか、時間を過ぎると自動で録音終了します</span>
    </div>

    <div class="master-controls">
        <button id="masterPlayBtn" class="btn-master-play">▶ 全トラック一斉ループ再生</button>
        <button id="masterStopBtn" class="btn-master-stop">■ 全停止</button>
    </div>

    <div class="tracks-container" id="tracksContainer"></div>

<script>
    // ★★★ あなたのGASのWebアプリURL（/exec）をここに貼り付けてください ★★★
    const GAS_URL = "https://script.google.com/macros/s/AKfycby3UDgPmxaR_ph8yO_vg71D0dnl_BINAVvqFoEH5p2kYi5aljRI6A2SyUhpHlJc5KhR/exec";

    const TRACK_COUNT = 8;
    const tracksContainer = document.getElementById('tracksContainer');
    const maxDurationSelect = document.getElementById('maxDuration');
    const masterPlayBtn = document.getElementById('masterPlayBtn');
    const masterStopBtn = document.getElementById('masterStopBtn');

    let trackData = Array.from({ length: TRACK_COUNT }, (_, i) => ({
        id: i + 1,
        mediaRecorder: null,
        audioChunks: [],
        audioBlob: null,
        audioElement: new Audio(),
        recordingTimeout: null
    }));

    trackData.forEach(track => {
        const row = document.createElement('div');
        row.className = 'track-row';
        row.id = `track-row-${track.id}`;
        row.innerHTML = `
            <div class="track-info">トラック ${track.id}</div>
            <div class="status-badge" id="status-${track.id}">空</div>
            <div class="btn-group">
                <button class="btn-rec" id="rec-${track.id}">録音</button>
                <button class="btn-stop" id="stop-${track.id}" disabled>停止</button>
                <button class="btn-play" id="play-${track.id}" disabled>再生</button>
                <button class="btn-loop" id="loop-${track.id}" disabled>ループ</button>
                <button class="btn-del" id="del-${track.id}" disabled>削除</button>
                <button class="btn-save" id="save-${track.id}" disabled>保存</button>
            </div>
        `;
        tracksContainer.appendChild(row);

        const recBtn = row.querySelector(`#rec-${track.id}`);
        const stopBtn = row.querySelector(`#stop-${track.id}`);
        const playBtn = row.querySelector(`#play-${track.id}`);
        const loopBtn = row.querySelector(`#loop-${track.id}`);
        const delBtn = row.querySelector(`#del-${track.id}`);
        const saveBtn = row.querySelector(`#save-${track.id}`);
        const statusBadge = row.querySelector(`#status-${track.id}`);

        recBtn.addEventListener('click', async () => {
            track.audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                });
                
                track.mediaRecorder = new MediaRecorder(stream);
                track.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) track.audioChunks.push(e.data);
                };

                track.mediaRecorder.onstop = () => {
                    clearTimeout(track.recordingTimeout);
                    track.audioBlob = new Blob(track.audioChunks, { type: 'audio/wav' });
                    track.audioElement.src = URL.createObjectURL(track.audioBlob);
                    
                    row.classList.remove('recording');
                    statusBadge.innerText = "データあり";
                    
                    recBtn.disabled = false;
                    stopBtn.disabled = true;
                    playBtn.disabled = false;
                    loopBtn.disabled = false;
                    delBtn.disabled = false;
                    saveBtn.disabled = false;

                    stream.getTracks().forEach(t => t.stop());
                };

                track.mediaRecorder.start();
                row.classList.add('recording');
                statusBadge.innerText = "録音中...";
                recBtn.disabled = true;
                stopBtn.disabled = false;

                const limitTime = parseInt(maxDurationSelect.value) * 1000;
                track.recordingTimeout = setTimeout(() => {
                    if (track.mediaRecorder && track.mediaRecorder.state !== 'inactive') {
                        track.mediaRecorder.stop();
                    }
                }, limitTime);

            } catch (err) {
                alert("マイクエラー: " + err);
            }
        });

        stopBtn.addEventListener('click', () => {
            if (track.mediaRecorder && track.mediaRecorder.state !== 'inactive') {
                track.mediaRecorder.stop();
            }
            if (!track.audioElement.paused) {
                track.audioElement.pause();
                track.audioElement.currentTime = 0;
                row.classList.remove('playing');
                statusBadge.innerText = "データあり";
            }
        });

        playBtn.addEventListener('click', () => {
            track.audioElement.loop = false;
            track.audioElement.currentTime = 0;
            track.audioElement.play();
            row.classList.add('playing');
            statusBadge.innerText = "再生中";
            stopBtn.disabled = false;
        });

        loopBtn.addEventListener('click', () => {
            track.audioElement.loop = true;
            track.audioElement.currentTime = 0;
            track.audioElement.play();
            row.classList.add('playing');
            statusBadge.innerText = "ループ再生中";
            stopBtn.disabled = false;
        });

        track.audioElement.addEventListener('ended', () => {
            if (!track.audioElement.loop) {
                row.classList.remove('playing');
                statusBadge.innerText = "データあり";
            }
        });

        delBtn.addEventListener('click', () => {
            track.audioElement.pause();
            track.audioElement.src = "";
            track.audioBlob = null;
            track.audioChunks = [];
            row.className = 'track-row';
            statusBadge.innerText = "空";
            playBtn.disabled = true;
            loopBtn.disabled = true;
            delBtn.disabled = true;
            saveBtn.disabled = true;
            stopBtn.disabled = true;
        });
        
        // ★新機能：各トラックごとのGoogleドライブ保存処理
        saveBtn.addEventListener('click', async () => {
            if (!track.audioBlob) return;

            statusBadge.innerText = "ドライブ保存中...";
            saveBtn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(track.audioBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];

                const payload = {
                    audio: base64Audio,
                    // ファイル名に「トラック番号」を含めることで分かりやすく！
                    fileName: `track${track.id}_${Date.now()}.wav`
                };

                try {
                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    
                    if (result.status === "success") {
                        statusBadge.innerText = "保存完了！";
                    } else {
                        statusBadge.innerText = "保存失敗";
                        alert("エラー: " + result.message);
                    }
                } catch (error) {
                    statusBadge.innerText = "通信エラー";
                    console.error(error);
                } finally {
                    saveBtn.disabled = false;
                }
            };
        });
    });

    masterPlayBtn.addEventListener('click', () => {
        trackData.forEach(track => {
            if (track.audioBlob) {
                const row = document.getElementById(`track-row-${track.id}`);
                const statusBadge = document.getElementById(`status-${track.id}`);
                const stopBtn = document.getElementById(`stop-${track.id}`);
                
                track.audioElement.loop = true;
                track.audioElement.currentTime = 0;
                track.audioElement.play();
                
                row.classList.add('playing');
                statusBadge.innerText = "ループ再生中";
                stopBtn.disabled = false;
            }
        });
    });

    masterStopBtn.addEventListener('click', () => {
        trackData.forEach(track => {
            if (track.mediaRecorder && track.mediaRecorder.state !== 'inactive') {
                track.mediaRecorder.stop();
            }
            if (!track.audioElement.paused) {
                track.audioElement.pause();
                track.audioElement.currentTime = 0;
                
                const row = document.getElementById(`track-row-${track.id}`);
                const statusBadge = document.getElementById(`status-${track.id}`);
                row.classList.remove('playing');
                statusBadge.innerText = "データあり";
            }
        });
    });
</script>
</body>
</html>
