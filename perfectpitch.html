<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音域＆音階翻訳シミュレーター</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 440px; text-align: center; }
        h1 { font-size: 1.2rem; margin-bottom: 20px; color: #333; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; background-color: #007bff; color: white; margin-bottom: 25px; }
        .btn.active { background-color: #dc3545; }
        
        .display-box { background-color: #f8f9fa; border: 2px solid #dee2e6; border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        .note-text { font-size: 3.5rem; font-weight: bold; color: #28a745; margin: 0; min-height: 5rem; line-height: 5rem; }
        .hz-text { font-family: monospace; font-size: 1.2rem; color: #6c757d; margin-top: 5px; }
        
        /* 音域レポート用スタイル */
        .range-box { background-color: #e9ecef; border-radius: 8px; padding: 15px; text-align: left; font-size: 0.9rem; }
        .range-box h3 { margin: 0 0 10px 0; font-size: 1rem; color: #495057; border-bottom: 1px solid #ccc; padding-bottom: 3px; }
        .range-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-family: monospace; }
        .range-val { font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>音階＆音域アナライザー</h1>
    
    <button id="startBtn" class="btn">計測スタート</button>

    <div class="display-box">
        <div id="noteDisplay" class="note-text">--</div>
        <div id="hzDisplay" class="hz-text">0 Hz</div>
    </div>
    
    <div class="range-box">
        <h3>📊 今回の計測結果（音域）</h3>
        <div class="range-row"><span>最低音:</span> <span id="minNoteDisplay" class="range-val">--</span></div>
        <div class="range-row"><span>最高音:</span> <span id="maxNoteDisplay" class="range-val">--</span></div>
        <div class="range-row"><span>音域の幅:</span> <span id="rangeWidthDisplay" class="range-val" style="color:#ce8002;">--</span></div>
    </div>
</div>

<script>
    let audioCtx = null; let analyser = null; let stream = null;
    let isListening = false; let animationId = null;

    // 音域計測用の変数
    let minHz = Infinity;
    let maxHz = -Infinity;
    let minNoteStr = "--";
    let maxNoteStr = "--";

    const startBtn = document.getElementById('startBtn');
    const noteDisplay = document.getElementById('noteDisplay');
    const hzDisplay = document.getElementById('hzDisplay');
    const minNoteDisplay = document.getElementById('minNoteDisplay');
    const maxNoteDisplay = document.getElementById('maxNoteDisplay');
    const rangeWidthDisplay = document.getElementById('rangeWidthDisplay');

    const NOTE_NAMES = ["ド", "ド#", "レ", "レ#", "ミ", "ファ", "ファ#", "ソ", "ソ#", "ラ", "ラ#", "シ"];

    function hzToNoteInfo(frequency) {
        const noteNum = 12 * (Math.log2(frequency / 440));
        const roundedNote = Math.round(noteNum) + 69;
        const noteIndex = (roundedNote % 12 + 12) % 12;
        const octave = Math.floor(roundedNote / 12) - 1; // オクターブ（高さの階層。4が真ん中）
        
        return {
            str: `${NOTE_NAMES[noteIndex]} (M${octave})`, // 例: ド (M4) 
            semiToneValue: roundedNote // 鍵盤の絶対位置（幅の計算用）
        };
    }

    async function toggleMic() {
        if (!isListening) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err) {
                alert('マイクのアクセスを許可してください');
                return;
            }

            // 音域データの初期化
            minHz = Infinity; maxHz = -Infinity;
            minNoteStr = "--"; maxNoteStr = "--";
            minNoteDisplay.textContent = "--"; maxNoteDisplay.textContent = "--"; rangeWidthDisplay.textContent = "--";

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;

            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);

            isListening = true;
            startBtn.textContent = '計測ストップ（結果確定）';
            startBtn.classList.add('active');

            update();
        } else {
            if (animationId) cancelAnimationFrame(animationId);
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (audioCtx) audioCtx.close();
            
            isListening = false;
            startBtn.textContent = '計測スタート';
            startBtn.classList.remove('active');
            noteDisplay.textContent = '--';
            hzDisplay.textContent = '0 Hz';
        }
    }

    function update() {
        if (!isListening) return;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Float32Array(bufferLength);
        analyser.getFloatFrequencyData(dataArray);

        let maxIndex = -1; let maxValue = -Infinity;
        for (let i = 0; i < bufferLength; i++) {
            if (dataArray[i] > maxValue) { maxValue = dataArray[i]; maxIndex = i; }
        }

        const sampleRate = audioCtx.sampleRate;
        const frequency = maxIndex * sampleRate / analyser.fftSize;

        // ちょっと厳しめに判定（雑音を拾いにくくするため判定音量を-50dB以上に）
        if (maxValue > -50 && frequency > 60 && frequency < 4000) {
            const currentHz = Math.round(frequency);
            const noteInfo = hzToNoteInfo(frequency);
            
            hzDisplay.textContent = `${currentHz} Hz`;
            noteDisplay.textContent = noteInfo.str.split(' ')[0]; // 画面中央には「ド」だけ表示

            // ★ 最低音・最高音の更新ロジック
            if (frequency < minHz) {
                minHz = frequency;
                minNoteStr = `${noteInfo.str} [${currentHz}Hz]`;
                minNoteDisplay.textContent = minNoteStr;
            }
            if (frequency > maxHz) {
                maxHz = frequency;
                maxNoteStr = `${noteInfo.str} [${currentHz}Hz]`;
                maxNoteDisplay.textContent = maxNoteStr;
            }

            // ★ 音域の幅を計算（最高音と最低音の半音の差からオクターブを割り出す）
            if (minHz !== Infinity && maxHz !== -Infinity) {
                const minInfo = hzToNoteInfo(minHz);
                const maxInfo = hzToNoteInfo(maxHz);
                const diffSemitones = maxInfo.semiToneValue - minInfo.semiToneValue;
                const octaves = (diffSemitones / 12).toFixed(1);
                rangeWidthDisplay.textContent = `${diffSemitones} 半音 (約 ${octaves} オクターブ)`;
            }
        }

        animationId = requestAnimationFrame(update);
    }

    startBtn.addEventListener('click', toggleMic);
</script>

</body>
</html>
